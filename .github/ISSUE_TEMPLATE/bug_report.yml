name: Bug Report / 不具合報告
description: Report a bug in WinLauncher / WinLauncherの不具合を報告する
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description / 内容
      description: Describe the bug. / 不具合の内容を記載してください。
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce / 再現手順
      description: How can we reproduce the issue? / どのような手順で再現しますか？
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior / 期待する動作
      description: What did you expect to happen? / 本来どうなるべきか記載してください。
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior / 実際の動作
      description: What actually happened? / 実際に発生した動作を記載してください。
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: WinLauncher version / バージョン
      placeholder: "e.g. v0.6.1"
    validations:
      required: true
  - type: dropdown
    id: installer-type
    attributes:
      label: Installer type / インストール方法
      options:
        - exe
        - msi
        - winget
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version / Windowsバージョン
      placeholder: "e.g. Windows 11 23H2"
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context / その他
      description: Logs, screenshots, etc. (optional) / ログ・スクリーンショット等（任意）
    validations:
      required: false
